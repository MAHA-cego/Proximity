services:
  postgres:
    image: postgres:16

    container_name: proximity-postgres

    restart: unless-stopped

    ports:
      - "5433:5432"

    environment:
      POSTGRES_DB: proximity
      POSTGRES_USER: proximity
      POSTGRES_PASSWORD: proximity

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proximity -d proximity"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data: